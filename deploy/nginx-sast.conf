# nginx site — serves the Vue SPA + static files, proxies the rest
# (API, auth pages, Django admin) to gunicorn on 127.0.0.1:8001.
# Install: sudo cp deploy/nginx-sast.conf /etc/nginx/sites-available/sast
#          sudo ln -s /etc/nginx/sites-available/sast /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Must exceed SAST_MAX_UPLOAD_SIZE_MB (250) or nginx 413s uploads
    # before Django ever sees them.
    client_max_body_size 260M;

    # Vue SPA — static build, no Django involved. Hash routing means
    # the only real paths are /app/ and /app/assets/*.
    location /app/ {
        alias /mnt/c/Users/Peli911GT/Desktop/sast/frontend/dist/;
        index index.html;
    }

    # collectstatic output (styled auth pages CSS, Django admin assets).
    location /static/ {
        alias /mnt/c/Users/Peli911GT/Desktop/sast/staticfiles/;
    }

    # /media/ (uploaded source archives) is deliberately NOT exposed —
    # archives are scan inputs read server-side, never public files.

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Scan triggers return fast (async), but PDF generation can
        # take a moment on big scans.
        proxy_read_timeout 120s;
    }
}
