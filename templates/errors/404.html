<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <style>
        body {
            background: #fafafa;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
            color: #555;
        }
        .box {
            display: inline-block;
            padding: 20px 40px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
        }
        h1 {
            margin-bottom: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>404 — Page Not Found</h1>
        <p>The page you are looking for does not exist.</p>
        <p><a href="/">Go back home</a></p>
    </div>
</body>
</html>
