<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server error: SAST Platform</title>
    <style>
        /* Deliberately standalone; does NOT extend base.html.
           A 500 may mean template loading itself is broken, so this
           page keeps zero dependencies on the rest of the theme. */
        :root {
          color-scheme: light dark;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            color: #1f2937;
            background: #f9fafb;
        }
        .box {
            max-width: 480px;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .meta {
            font-family: ui-monospace, "JetBrains Mono", Consolas, monospace;
            font-size: 0.8rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.75rem;
        }
        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.75rem;
        }
        p {
            margin: 0 0 1.5rem;
            color: #4b5563;
            line-height: 1.55;
        }
        a {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
        }
        @media (prefers-color-scheme: dark) {
          body { color: #e5e7eb; background: #0f172a; }
          .meta { color: #94a3b8; }
          p { color: #cbd5e1; }
        }
    </style>
</head>
<body>
    <div class="box">
        <p class="meta">500: server error</p>
        <h1>Something went wrong</h1>
        <p>An unexpected error broke this request. The team has been logged; please try again in a moment.</p>
        <a href="/app/">Back to projects</a>
    </div>
</body>
</html>
