<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Error</title>
    <style>
        body {
            background: #fafafa;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
            color: #555;
        }
        .box {
            display: inline-block;
            padding: 20px 40px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
        }

            margin-bottom: 10px;
            color: #333;
        }

<body>
    <div class="box">
        <h1>500 — Server Error</h1>
        <p>Something went wrong on our end.</p>
        <p>Please try again later.</p>
    </div>

</html>
